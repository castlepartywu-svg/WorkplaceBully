<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>職場霸凌事件申訴委任書</title>
<style>
  body {
    font-family: "Microsoft JhengHei", "PMingLiU", "Noto Sans TC", sans-serif;
    max-width: 900px;
    margin: 30px auto;
    color: #222;
    line-height: 1.8;
  }
  h1 {
    text-align: center;
    font-size: 22px;
    margin-bottom: 24px;
  }
  table {
    width: 100%;
    border-collapse: collapse;
    margin-bottom: 24px;
  }
  th, td {
    border: 1px solid #666;
    padding: 8px 10px;
    vertical-align: top;
    font-size: 14px;
    text-align: center;
  }
  th {
    background: #f2f2f2;
    font-weight: bold;
  }
  .section-title {
    background: #dde6f0;
    font-weight: bold;
    writing-mode: vertical-rl;
    width: 36px;
  }
  input[type="text"] {
    width: 100%;
    border: none;
    border-bottom: 1px dashed #999;
    font-size: 14px;
    font-family: inherit;
    padding: 2px;
    box-sizing: border-box;
    background: transparent;
    text-align: center;
  }
  .checkbox-line label {
    margin-right: 20px;
  }
  .statement {
    font-size: 15px;
    line-height: 2.2;
    margin: 30px 0;
  }
  .statement input[type="text"] {
    display: inline-block;
    width: 160px;
    text-align: center;
  }
  .to-line {
    text-align: right;
    margin: 20px 0;
  }
  .signature-line {
    margin: 20px 0;
  }
  .signature-line div {
    margin-bottom: 16px;
    border-bottom: 1px solid #333;
    display: inline-block;
    padding-bottom: 30px;
    width: 100%;
  }
  .small {
    font-size: 12px;
    color: #666;
    text-align: right;
  }
  /* 申訴人（委任人）需填寫的部分反白（黃底標示） */
  .fillable td:not(.section-title) {
    background-color: #ffee58;
  }
  .fillable input[type="text"] {
    background: transparent;
  }
  .checkbox-line label,
  .statement label {
    background-color: #ffee58;
    padding: 2px 6px;
    border-radius: 2px;
  }
  .statement input[type="text"],
  .to-line input[type="text"] {
    background-color: #ffee58;
  }
  .fillable-inline {
    background-color: #ffee58;
    display: inline-block;
    min-width: 160px;
    padding: 0 4px;
  }
</style>
</head>
<body>

<h1>職場霸凌事件申訴委任書</h1>

<div class="checkbox-line" style="text-align:right; margin-bottom:10px;">
  <label><input type="checkbox"> 並有</label>
  <label><input type="checkbox"> 但無</label>
</div>

<table class="fillable">
  <tr>
    <th></th>
    <th>稱謂</th>
    <th>姓名</th>
    <th>出生年月日</th>
    <th>國民身分證統一編號</th>
    <th>住(居)所地址</th>
    <th>聯絡電話</th>
  </tr>
  <tr>
    <td class="section-title">委任人</td>
    <td><input type="text"></td>
    <td><input type="text"></td>
    <td><input type="text"></td>
    <td><input type="text"></td>
    <td><input type="text"></td>
    <td><input type="text"></td>
  </tr>
  <tr>
    <td class="section-title">委任代理人</td>
    <td><input type="text"></td>
    <td><input type="text"></td>
    <td><input type="text"></td>
    <td><input type="text"></td>
    <td><input type="text"></td>
    <td><input type="text"></td>
  </tr>
</table>

<div class="statement">
  茲委任 <input type="text"> 為代理人，受委任人就本人與 <input type="text"> 間職場霸凌案件，有為一切申訴行為之代理權限，
  <label><input type="checkbox"> 撤回申訴</label> 之特別權限，爰依法提出本件委任書。
</div>

<div class="to-line">
  此致<br>
  <input type="text" style="width:300px; display:inline-block;">（機關名稱）
</div>

<div class="signature-line">
  <div>申訴人：<span class="fillable-inline">&nbsp;</span> (簽章)</div>
  <div>代理人(如無則免填)：<span class="fillable-inline">&nbsp;</span> (簽章)</div>
</div>

<p class="small">附件 2 委任書範本</p>

</body>
</html>
